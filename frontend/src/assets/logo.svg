<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- 主色渐变：赭石橙红 -->
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c7471c"/>
      <stop offset="60%" stop-color="#a83a14"/>
      <stop offset="100%" stop-color="#8a2e0e"/>
    </linearGradient>
    
    <!-- 金色光芒渐变 -->
    <linearGradient id="glowGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#d4940d"/>
      <stop offset="50%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    
    <!-- 书页渐变 -->
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#faf4eb"/>
    </linearGradient>
    
    <!-- 投影 -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1c1612" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <!-- 背景圆（可选，用于图标场景） -->
  <circle cx="256" cy="256" r="240" fill="var(--color-bg-elevated, #ffffff)" opacity="0"/>
  
  <!-- 光芒层：典亮的"光" -->
  <g id="rays" opacity="0.9">
    <!-- 中心光芒 -->
    <path d="M256 60 L264 120 L256 135 L248 120 Z" fill="url(#glowGrad)"/>
    <path d="M256 60 L264 120 L256 135 L248 120 Z" fill="url(#glowGrad)" transform="rotate(30 256 256)"/>
    <path d="M256 60 L264 120 L256 135 L248 120 Z" fill="url(#glowGrad)" transform="rotate(-30 256 256)"/>
    <path d="M256 60 L264 120 L256 135 L248 120 Z" fill="url(#glowGrad)" transform="rotate(60 256 256)"/>
    <path d="M256 60 L264 120 L256 135 L248 120 Z" fill="url(#glowGrad)" transform="rotate(-60 256 256)"/>
    <!-- 小光芒点缀 -->
    <circle cx="256" cy="110" r="14" fill="url(#glowGrad)" opacity="0.9"/>
  </g>
  
  <!-- 书本主体 -->
  <g id="book" filter="url(#shadow)">
    <!-- 书底封面 -->
    <path d="M100 380 Q100 410 130 410 L256 425 L382 410 Q412 410 412 380 L412 200 Q412 185 395 185 L256 200 L117 185 Q100 185 100 200 Z" 
          fill="url(#bookGrad)"/>
    
    <!-- 左页 -->
    <path d="M112 200 Q180 190 256 205 L256 405 Q180 395 112 395 Q105 395 105 388 L105 207 Q105 200 112 200 Z" 
          fill="url(#pageGrad)" stroke="#e5ddd4" stroke-width="1"/>
    
    <!-- 右页 -->
    <path d="M400 200 Q332 190 256 205 L256 405 Q332 395 400 395 Q407 395 407 388 L407 207 Q407 200 400 200 Z" 
          fill="url(#pageGrad)" stroke="#e5ddd4" stroke-width="1"/>
    
    <!-- 书脊（中间褶皱） -->
    <path d="M256 200 L256 425" stroke="#8a2e0e" stroke-width="3" opacity="0.4"/>
    <path d="M248 201 L248 423 M264 201 L264 423" stroke="#1c1612" stroke-width="1" opacity="0.08"/>
    
    <!-- 左页文字行（法条意象） -->
    <g opacity="0.55">
      <rect x="125" y="235" width="90" height="5" rx="2.5" fill="#5c534b"/>
      <rect x="125" y="255" width="110" height="5" rx="2.5" fill="#5c534b"/>
      <rect x="125" y="275" width="85" height="5" rx="2.5" fill="#5c534b"/>
      <rect x="125" y="295" width="100" height="5" rx="2.5" fill="#5c534b"/>
      <rect x="125" y="315" width="70" height="5" rx="2.5" fill="#5c534b"/>
      <rect x="125" y="345" width="95" height="5" rx="2.5" fill="#5c534b"/>
      <rect x="125" y="365" width="60" height="5" rx="2.5" fill="#5c534b"/>
    </g>
    
    <!-- 右页文字行 -->
    <g opacity="0.55">
      <rect x="277" y="235" width="100" height="5" rx="2.5" fill="#5c534b"/>
      <rect x="277" y="255" width="80" height="5" rx="2.5" fill="#5c534b"/>
      <rect x="277" y="275" width="110" height="5" rx="2.5" fill="#5c534b"/>
      <rect x="277" y="295" width="75" height="5" rx="2.5" fill="#5c534b"/>
      <rect x="277" y="315" width="105" height="5" rx="2.5" fill="#5c534b"/>
      <rect x="277" y="345" width="85" height="5" rx="2.5" fill="#5c534b"/>
      <rect x="277" y="365" width="65" height="5" rx="2.5" fill="#5c534b"/>
    </g>
    
    <!-- 书页折角细节（左） -->
    <path d="M112 395 Q112 400 118 400 L130 405 L112 385 Z" fill="#d9d3cb" opacity="0.6"/>
    <!-- 书页折角细节（右） -->
    <path d="M400 395 Q400 400 394 400 L382 405 L400 385 Z" fill="#d9d3cb" opacity="0.6"/>
  </g>
  
  <!-- "典"字印章风格装饰（书页中央金色圆章） -->
  <circle cx="256" cy="320" r="26" fill="url(#glowGrad)" opacity="0.95" filter="url(#shadow)"/>
  <circle cx="256" cy="320" r="20" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  <!-- 简化的 "法" 字笔画（竖+横折） -->
  <g stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.95">
    <line x1="256" y1="308" x2="256" y2="332"/>
    <line x1="248" y1="312" x2="264" y2="312"/>
    <line x1="248" y1="320" x2="264" y2="320"/>
    <line x1="248" y1="328" x2="264" y2="328"/>
  </g>
</svg>
